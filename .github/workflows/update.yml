name: Update and deploy S2 signal cycle lab

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"
  push:
    branches: ["main"]
    paths:
      - "index.html"
      - "assets/**"
      - "scripts/**"
      - "config/**"
      - ".github/workflows/update.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 14
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Build strict public-artifact bundle
        timeout-minutes: 10
        run: python -u scripts/build_bundle.py
      - name: Upload generated data artifact
        uses: actions/upload-artifact@v4
        with:
          name: s2-signal-cycle-derived-data
          path: |
            data/derived/*.json
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
